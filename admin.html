<!DOCTYPE html>
<html lang="el" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediRadar Admin - Διαχείριση</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script>
        const SB_URL = "https://qzerrisyowkfkmcyxmav.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6ZXJyaXN5b3drZmttY3l4bWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAwMTcxODQsImV4cCI6MjA3NTU5MzE4NH0.alkvHkOQPBTwY3daUcKAEsf4-aI1tQvKxmhR-S330i4";
        window.db = supabase.createClient(SB_URL, SB_KEY);

        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800">

    <div class="min-h-screen flex flex-col">
        <nav class="bg-slate-900 text-white p-6 shadow-xl">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="ph-fill ph-shield-check text-3xl text-blue-400"></i>
                    <div>
                        <h1 class="text-xl font-bold leading-none">MediRadar Admin</h1>
                        <p class="text-slate-400 text-xs mt-1">Σύστημα Ελέγχου Δικτύου</p>
                    </div>
                </div>
                <div id="stats" class="hidden md:flex gap-6 text-sm">
                    <div class="border-l border-slate-700 pl-6"><span class="block text-slate-500">Live Αιτήματα</span> <span id="stat-req" class="font-bold">-</span></div>
                    <div class="border-l border-slate-700 pl-6"><span class="block text-slate-500">Εκκρεμή Φαρμακεία</span> <span id="stat-pharm" class="font-bold">-</span></div>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto w-full p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-4">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    <i class="ph ph-storefront"></i> Εγκρίσεις Φαρμακείων
                </h2>
                <div id="pharm-list" class="space-y-3">
                    </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    <i class="ph ph-list-bullets"></i> Ιστορικό & Live Αιτήματα
                </h2>
                <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="p-4 text-xs font-bold text-slate-500">ΦΑΡΜΑΚΟ</th>
                                <th class="p-4 text-xs font-bold text-slate-500">ΠΕΛΑΤΗΣ</th>
                                <th class="p-4 text-xs font-bold text-slate-500">STATUS</th>
                                <th class="p-4 text-xs font-bold text-slate-500">ΦΑΡΜΑΚΕΙΟ</th>
                            </tr>
                        </thead>
                        <tbody id="req-table-body" class="divide-y divide-slate-50">
                            </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script>
        async function refreshData() {
            // 1. Fetch Pending Pharmacies
            const { data: pharms } = await window.db.from('pharmacies').select('*').eq('status', 'pending');
            const pList = document.getElementById('pharm-list');
            document.getElementById('stat-pharm').innerText = pharms ? pharms.length : 0;
            
            if (!pharms || pharms.length === 0) {
                pList.innerHTML = `<div class="bg-white p-6 rounded-2xl border text-center text-slate-400 text-sm">Όλα εγκεκριμένα!</div>`;
            } else {
                pList.innerHTML = pharms.map(p => `
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex justify-between items-center">
                        <div class="overflow-hidden">
                            <p class="font-bold text-slate-900 truncate">${p.name}</p>
                            <p class="text-xs text-slate-400 truncate">${p.id}</p>
                        </div>
                        <button onclick="approvePharm('${p.id}')" class="bg-blue-600 text-white text-xs font-bold px-4 py-2 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-100">APPROVE</button>
                    </div>
                `).join('');
            }

            // 2. Fetch All Requests
            const { data: reqs } = await window.db.from('requests').select('*').order('created_at', { ascending: false }).limit(20);
            const rTable = document.getElementById('req-table-body');
            document.getElementById('stat-req').innerText = reqs ? reqs.filter(r => r.status === 'pending').length : 0;

            if (!reqs || reqs.length === 0) {
                rTable.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-slate-400">Δεν υπάρχουν αιτήματα στη βάση.</td></tr>`;
            } else {
                rTable.innerHTML = reqs.map(r => `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-4"><span class="font-bold text-slate-900">${r.medicine_name}</span></td>
                        <td class="p-4 text-sm text-slate-500">${r.customer_name || '-'}</td>
                        <td class="p-4">
                            <span class="text-[10px] font-bold px-2 py-1 rounded-full uppercase ${r.status === 'pending' ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-600'}">
                                ${r.status}
                            </span>
                        </td>
                        <td class="p-4 text-sm font-medium text-blue-600">${r.winner_pharmacy || '-'}</td>
                    </tr>
                `).join('');
            }
        }

        async function approvePharm(id) {
            const { error } = await window.db.from('pharmacies').update({ status: 'approved' }).eq('id', id);
            if (error) alert(error.message);
            else refreshData();
        }

        // INIT & REALTIME
        window.onload = refreshData;
        window.db.channel('admin-channel').on('postgres_changes', {event:'*', schema:'public'}, refreshData).subscribe();
    </script>
</body>
</html>

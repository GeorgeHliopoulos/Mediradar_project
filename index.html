<!DOCTYPE html>
<html lang="el" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediRadar - Βρες το φάρμακό σου</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script>
        const SB_URL = "https://qzerrisyowkfkmcyxmav.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6ZXJyaXN5b3drZmttY3l4bWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAwMTcxODQsImV4cCI6MjA3NTU5MzE4NH0.alkvHkOQPBTwY3daUcKAEsf4-aI1tQvKxmhR-S330i4";
        window.db = supabase.createClient(SB_URL, SB_KEY);

        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>

    <style>
        body { background: #f8fafc; }
        .app-card { background: white; border-radius: 2rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        .radar-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.1); } }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        
        <div class="app-card w-full max-w-md p-8 border border-white">
            
            <div class="text-center mb-8" id="app-header">
                <div class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                    <i class="ph-fill ph-radar text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900">MediRadar</h1>
                <p class="text-slate-500 text-sm">Βρες το φάρμακό σου σε δευτερόλεπτα</p>
            </div>

            <div id="search-section" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-400 uppercase ml-2">Στοιχεία Επικοινωνίας</label>
                    <input type="text" id="cust-name" placeholder="Ονοματεπώνυμο" class="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                    <input type="tel" id="cust-phone" placeholder="Τηλέφωνο" class="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-400 uppercase ml-2">Τι ψάχνετε;</label>
                    <input type="text" id="med-name" placeholder="Όνομα φαρμάκου (π.χ. Depon)" class="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-blue-500 transition-all outline-none font-bold text-lg">
                </div>

                <button onclick="startSearch()" class="w-full bg-blue-600 text-white font-bold p-5 rounded-2xl shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all flex items-center justify-center gap-2 mt-4">
                    <i class="ph-bold ph-magnifying-glass"></i>
                    Αναζήτηση στο Ραντάρ
                </button>
            </div>

            <div id="radar-section" class="hidden py-10 text-center">
                <div class="relative w-32 h-32 mx-auto mb-8">
                    <div class="absolute inset-0 bg-blue-100 rounded-full animate-ping opacity-20"></div>
                    <div class="absolute inset-4 bg-blue-200 rounded-full animate-ping opacity-40"></div>
                    <div class="absolute inset-8 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-xl shadow-blue-200">
                        <i class="ph-fill ph-radar text-4xl animate-spin" style="animation-duration: 3s"></i>
                    </div>
                </div>
                <h2 class="text-xl font-bold text-slate-800">Αναζήτηση σε εξέλιξη...</h2>
                <p class="text-slate-500 text-sm mt-2 px-4">Ειδοποιήσαμε τα κοντινά φαρμακεία. Μην κλείσετε τη σελίδα.</p>
            </div>

            <div id="success-section" class="hidden py-6 text-center">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="ph-fill ph-check-circle text-5xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-900">Βρέθηκε!</h2>
                <p class="text-slate-500 mb-6">Το φάρμακο δεσμεύτηκε για εσάς.</p>
                
                <div class="bg-green-50 border border-green-100 p-5 rounded-3xl mb-6">
                    <p class="text-xs text-green-600 font-bold uppercase tracking-wider mb-1">Φαρμακείο</p>
                    <h3 id="winner-name" class="text-xl font-bold text-green-900">-</h3>
                </div>

                <button onclick="location.reload()" class="text-blue-600 font-bold hover:underline">Νέα Αναζήτηση</button>
            </div>

        </div>

        <p class="mt-8 text-slate-400 text-xs">MediRadar v1.0 • Σύστημα Εύρεσης Φαρμάκων</p>
    </div>

    <script>
        async function startSearch() {
            const med = document.getElementById('med-name').value;
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;

            if (!med) { alert("Παρακαλώ εισάγετε το όνομα του φαρμάκου"); return; }

            // UI Transition
            document.getElementById('search-section').classList.add('hidden');
            document.getElementById('radar-section').classList.remove('hidden');

            // 1. Create request
            const { data, error } = await window.db.from('requests').insert([{
                medicine_name: med,
                customer_name: name || 'Ανώνυμος',
                customer_phone: phone || '-',
                status: 'pending'
            }]).select();

            if (error) { alert("Σφάλμα δικτύου"); location.reload(); return; }

            const requestId = data[0].id;

            // 2. Real-time Listen for 'reserved' status
            window.db.channel('request-watch')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'requests', filter: `id=eq.${requestId}` }, payload => {
                if (payload.new.status === 'reserved') {
                    showSuccess(payload.new.winner_pharmacy);
                }
            })
            .subscribe();
        }

        function showSuccess(pharmacyName) {
            document.getElementById('radar-section').classList.add('hidden');
            document.getElementById('success-section').classList.remove('hidden');
            document.getElementById('winner-name').innerText = pharmacyName;
            
            // Vibration if supported
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediRadar Pro - Portal Φαρμακείου</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script>
        const SB_URL = "https://qzerrisyowkfkmcyxmav.supabase.co";
        // Έβαλα το νέο Publishable Key που φαίνεται στο screenshot σου!
        const SB_KEY = "sb_publishable_ltaNA7nnVozoSC0cZIjg";
        window.db = supabase.createClient(SB_URL, SB_KEY);
    </script>

    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .req-card { transition: all 0.2s; border-left: 4px solid transparent; }
        .req-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .req-card.new { border-left-color: #3b82f6; background-color: #eff6ff; }
        .btn-accept { background: #3b82f6; color: white; transition: 0.2s; }
        .btn-accept:hover { background: #2563eb; }
        /* Νέο Overlay που επιβεβαιώνει ότι τρέχεις τον νέο κώδικα */
        #global-loader { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body class="text-slate-800">

    <div id="global-loader">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
        <p class="text-slate-500 font-bold">Φόρτωση Πύλης (NEW VERSION)...</p>
    </div>

    <section id="auth-section" class="min-h-screen flex items-center justify-center p-4 hidden">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
            <div class="text-center mb-8">
                <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600">
                    <i class="ph-fill ph-prescription text-3xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900">MediRadar Pro</h1>
                <p class="text-slate-500 text-sm">Πλατφόρμα Φαρμακοποιών</p>
            </div>

            <form id="email-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Φαρμακείου</label>
                    <input type="email" id="pro-email" class="w-full p-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:outline-none transition-colors" placeholder="pharmacy@example.com" required>
                </div>
                <button type="submit" id="btn-send-otp" class="w-full bg-slate-900 text-white p-3 rounded-xl font-semibold hover:bg-slate-800 transition-colors">
                    Λήψη Κωδικού Εισόδου
                </button>
            </form>

            <form id="otp-form" class="space-y-4 hidden">
                <div class="bg-green-50 text-green-700 p-3 rounded-xl text-sm font-medium text-center mb-4">
                    Ο 6-ψήφιος κωδικός στάλθηκε στο email σας!
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1 text-center">Εισάγετε τον Κωδικό</label>
                    <input type="text" id="pro-otp" maxlength="6" class="w-full p-4 rounded-xl border border-slate-200 focus:border-blue-500 focus:outline-none text-center text-3xl tracking-[0.5em] font-bold" placeholder="------" required autocomplete="one-time-code">
                </div>
                <button type="submit" id="btn-verify-otp" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 transition-colors shadow-lg shadow-blue-600/30">
                    Επαλήθευση & Είσοδος
                </button>
                <button type="button" id="btn-reset" class="w-full text-center text-sm text-slate-500 mt-4 hover:underline">
                    Αλλαγή Email
                </button>
            </form>
        </div>
    </section>

    <section id="dashboard-section" class="min-h-screen flex flex-col hidden">
        <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-30">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2 rounded-lg shadow-lg shadow-blue-200">
                    <i class="ph-fill ph-radar text-xl"></i>
                </div>
                <div>
                    <h2 class="font-bold text-slate-800 text-lg leading-tight">Live Requests</h2>
                    <p id="pharmacy-name-display" class="text-xs text-slate-500 font-medium">Φαρμακείο ...</p>
                </div>
            </div>
            <button id="btn-logout" class="p-2 hover:bg-slate-100 rounded-full text-slate-400 hover:text-red-500 transition-colors"><i class="ph ph-sign-out text-xl"></i></button>
        </nav>
        <main class="flex-1 p-6 max-w-5xl mx-auto w-full">
            <div id="requests-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </main>
    </section>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const { data: { session }, error } = await window.db.auth.getSession();
                if (session) {
                    await syncPharmacy(session.user);
                } else {
                    document.getElementById('global-loader').classList.add('hidden');
                    document.getElementById('auth-section').classList.remove('hidden');
                }
            } catch (err) {
                document.getElementById('global-loader').classList.add('hidden');
                document.getElementById('auth-section').classList.remove('hidden');
                showToast("Σφάλμα σύνδεσης: " + err.message, "error");
            }

            document.getElementById('email-form').addEventListener('submit', handleSendOTP);
            document.getElementById('otp-form').addEventListener('submit', handleVerifyOTP);
            document.getElementById('btn-reset').addEventListener('click', resetToEmail);
            document.getElementById('btn-logout').addEventListener('click', logout);
        });

        async function handleSendOTP(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-send-otp');
            const email = document.getElementById('pro-email').value;
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Αποστολή...';
            btn.disabled = true;

            const { error } = await window.db.auth.signInWithOtp({ email: email });

            if (error) {
                showToast(error.message, 'error');
                btn.innerHTML = 'Λήψη Κωδικού Εισόδου';
                btn.disabled = false;
            } else {
                document.getElementById('email-form').classList.add('hidden');
                document.getElementById('otp-form').classList.remove('hidden');
            }
        }

        async function handleVerifyOTP(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-verify-otp');
            const email = document.getElementById('pro-email').value;
            const otp = document.getElementById('pro-otp').value;
            
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Επαλήθευση...';
            btn.disabled = true;

            // FIX: Τύπος email για να δέχεται το 6-ψήφιο
            const { data: { session }, error } = await window.db.auth.verifyOtp({
                email: email,
                token: otp,
                type: 'email' 
            });

            if (error) {
                showToast("Λάθος κωδικός ή έληξε: " + error.message, 'error');
                btn.innerHTML = 'Επαλήθευση & Είσοδος';
                btn.disabled = false;
            } else {
                document.getElementById('global-loader').classList.remove('hidden');
                document.getElementById('auth-section').classList.add('hidden');
                await syncPharmacy(session.user);
            }
        }

        function resetToEmail() {
            document.getElementById('otp-form').classList.add('hidden');
            document.getElementById('email-form').classList.remove('hidden');
            document.getElementById('btn-send-otp').innerHTML = 'Λήψη Κωδικού Εισόδου';
            document.getElementById('btn-send-otp').disabled = false;
        }

        async function syncPharmacy(user) {
            try {
                const { data, error } = await window.db.from('pharmacies').select('*').eq('id', user.id);
                let pharmacy = data && data.length > 0 ? data[0] : null;

                if (!pharmacy) {
                    const pharmacyName = 'Φαρμακείο ' + (user.email ? user.email.split('@')[0] : '');
                    await window.db.from('pharmacies').insert([{ id: user.id, name: pharmacyName, status: 'approved' }]);
                    pharmacy = { name: pharmacyName, status: 'approved' };
                } 

                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                document.getElementById('pharmacy-name-display').innerText = pharmacy.name || 'Φαρμακείο';
                
                fetchRequests();
                window.db.channel('global-radar').on('postgres_changes', {event:'*', schema:'public', table:'requests'}, () => {
                    fetchRequests();
                    playDing();
                }).subscribe();
            } catch(e) {
                showToast("Σφάλμα προφίλ: " + e.message, "error");
            } finally {
                document.getElementById('global-loader').classList.add('hidden');
            }
        }

        async function logout() {
            await window.db.auth.signOut();
            window.location.reload();
        }

        async function fetchRequests() {
            const { data: requests, error } = await window.db.from('requests').select('*').eq('status', 'pending').order('created_at', { ascending: false });
            if (!error) renderRequests(requests || []);
        }

        function renderRequests(requests) {
            const container = document.getElementById('requests-grid');
            if (requests.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-slate-400"><i class="ph ph-coffee text-4xl mb-4 inline-block opacity-50"></i><p>Αναμονή για νέα αιτήματα στην περιοχή σας...</p></div>`;
                return;
            }

            container.innerHTML = requests.map(req => `
                <div class="req-card bg-white p-5 rounded-xl shadow-sm border border-slate-100 new flex flex-col justify-between h-full">
                    <div>
                        <div class="flex justify-between items-start mb-3">
                            <span class="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-1 rounded uppercase tracking-wide">Νεο Αιτημα</span>
                            <span class="text-xs text-slate-400">${new Date(req.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </div>
                        <h3 class="text-lg font-bold text-slate-900 mb-1">${req.medicine_name || 'Φάρμακο'}</h3>
                        <p class="text-sm text-slate-500 mb-4">Πελάτης: <strong>${req.customer_name || 'Ανώνυμος'}</strong></p>
                    </div>
                    <button onclick="acceptRequest('${req.id}')" class="btn-accept w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-blue-500/30">
                        <i class="ph-bold ph-check"></i> Έχω το φάρμακο
                    </button>
                </div>
            `).join('');
        }

        async function acceptRequest(reqId) {
            const user = (await window.db.auth.getUser()).data.user;
            const { data: pharm } = await window.db.from('pharmacies').select('name').eq('id', user.id).single();
            
            const { error } = await window.db.from('requests').update({ 
                status: 'reserved', winner_pharmacy: pharm.name, pharmacy_id: user.id
            }).eq('id', reqId);

            if (error) showToast('Κάποιος άλλος πρόλαβε το αίτημα.', 'error');
            else showToast('🎉 Το αίτημα ανατέθηκε σε εσάς!', 'success');
            fetchRequests();
        }

        function playDing() { new Audio('https://cdn.freesound.org/previews/201/201159_866625-lq.mp3').play().catch(()=>{}); }

        function showToast(msg, type='info') {
            const c = document.getElementById('toast-container');
            const el = document.createElement('div');
            const bg = type === 'success' ? 'bg-green-500' : 'bg-red-500';
            el.className = `toast ${bg} text-white px-4 py-3 rounded-xl shadow-lg text-sm font-semibold flex items-center gap-2`;
            el.innerHTML = msg;
            c.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }
    </script>
</body>
</html>

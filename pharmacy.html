<!DOCTYPE html>
<html lang="el" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediRadar Pro - Diagnostic Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        body { background-color: #f1f5f9; padding-bottom: 35vh; } /* Αφήνουμε χώρο για το τερματικό */
        .req-card { transition: all 0.2s; border-left: 4px solid transparent; }
        .btn-accept { background: #3b82f6; color: white; transition: 0.2s; }
        
        /* DIAGNOSTIC TERMINAL */
        #debug-terminal { position: fixed; bottom: 0; left: 0; right: 0; height: 35vh; background: #050505; color: #00ff00; font-family: monospace; font-size: 11px; padding: 10px; overflow-y: auto; z-index: 99999; border-top: 3px solid #333; }
    </style>
</head>
<body class="text-slate-800">

    <div id="debug-terminal">
        <div class="text-white font-bold mb-2">=== ΣΥΣΤΗΜΑ ΔΙΑΓΝΩΣΗΣ MEDIRADAR ===</div>
    </div>

    <script>
        const term = document.getElementById('debug-terminal');
        function logTerm(msg, isErr=false) {
            const div = document.createElement('div');
            div.style.color = isErr ? '#ff4444' : '#00ff00';
            div.style.marginBottom = '4px';
            div.innerText = `> ${msg}`;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }
        window.onerror = function(m, u, l) { logTerm(`[ΣΦΑΛΜΑ]: ${m} (Γραμμή ${l})`, true); };
        window.onunhandledrejection = function(e) { logTerm(`[ΣΦΑΛΜΑ PROMISE]: ${e.reason.message || e.reason}`, true); };
        logTerm("Η σελίδα φορτώθηκε...");
    </script>

    <div id="global-loader" class="fixed inset-0 bg-white/95 z-50 flex flex-col justify-center items-center">
        <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-blue-600 mb-4"></div>
        <p class="text-slate-600 font-bold animate-pulse">Φόρτωση Συστήματος...</p>
    </div>

    <section id="auth-section" class="min-h-screen flex items-center justify-center p-4 hidden">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
            <div class="text-center mb-8">
                <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600">
                    <i class="ph-fill ph-prescription text-3xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900">MediRadar Pro</h1>
                <p class="text-slate-500 text-sm">Πλατφόρμα Φαρμακοποιών</p>
            </div>

            <form onsubmit="handleProLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Φαρμακείου</label>
                    <input type="email" id="pro-email" class="w-full p-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:outline-none" required>
                </div>
                <button type="submit" id="btn-login" class="w-full bg-slate-900 text-white p-3 rounded-xl font-semibold">
                    Αποστολή Magic Link
                </button>
            </form>

            <div class="mt-6 pt-6 border-t border-slate-100">
                 <button onclick="handleGoogleLoginPro()" class="w-full flex items-center justify-center gap-2 bg-white border border-slate-200 p-3 rounded-xl text-slate-700 font-medium hover:bg-slate-50">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5">
                    Σύνδεση με Google
                </button>
            </div>
        </div>
    </section>

    <section id="pending-section" class="min-h-screen flex flex-col items-center justify-center p-4 hidden">
        <i class="ph-duotone ph-hourglass-high text-6xl text-orange-500 mb-4 animate-pulse"></i>
        <h1 class="text-2xl font-bold text-slate-900">Αναμονή Έγκρισης</h1>
        <p class="text-slate-600 max-w-md text-center mt-2">Ο λογαριασμός σας δημιουργήθηκε επιτυχώς! Περιμένετε την έγκριση.</p>
        <button onclick="logout()" class="mt-8 text-sm text-slate-500 hover:text-red-500 underline font-bold">Αποσύνδεση</button>
    </section>

    <section id="dashboard-section" class="min-h-screen flex flex-col hidden">
        <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-30">
            <div>
                <h2 class="font-bold text-slate-800 text-lg">Live Requests</h2>
                <p id="pharmacy-name-display" class="text-xs text-slate-500">Φαρμακείο ...</p>
            </div>
            <div class="flex items-center gap-4">
                <button id="btn-sound" onclick="enableSound()" class="hidden bg-orange-100 text-orange-700 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1 animate-pulse">
                    Ενεργοποίηση Ήχου
                </button>
                <button onclick="logout()" class="p-2 hover:bg-slate-100 rounded-full text-slate-400 hover:text-red-500">
                    <i class="ph ph-sign-out text-xl"></i>
                </button>
            </div>
        </nav>
        <main class="flex-1 p-6 max-w-5xl mx-auto w-full">
            <div id="requests-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </main>
    </section>

    <script>
        logTerm("Αρχικοποίηση Supabase...");
        const SB_URL = "https://qzerrisyowkfkmcyxmav.supabase.co";
        const RAW_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6ZXJyaXN5b3drZmttY3l4bWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAwMTcxODQsImV4cCI6MjA3NTU5MzE4NH0.alkvHkOQPBTwY3daUcKAEsf4nt0kizuU3rYI2c2InPk";
        
        try {
            window.db = supabase.createClient(SB_URL, RAW_KEY.trim());
            logTerm("Supabase Ready.");
        } catch(e) {
            logTerm("ΣΦΑΛΜΑ Supabase Init: " + e.message, true);
        }

        let currentPharmacyId = null;

        window.addEventListener('load', () => {
            logTerm("Το παράθυρο φόρτωσε. Περιμένουμε το Auth Status...");
            
            // Δικλείδα Ασφαλείας αν κολλήσει το δίκτυο
            const sTimer = setTimeout(() => {
                logTerm("[ΠΡΟΣΟΧΗ] Το Supabase καθυστερεί. Αναγκαστικό άνοιγμα login...", true);
                document.getElementById('global-loader').classList.add('hidden');
                showAuth();
            }, 6000);

            window.db.auth.onAuthStateChange(async (ev, session) => {
                logTerm(`Supabase Auth Event: ${ev}`);
                if (session) {
                    clearTimeout(sTimer);
                    logTerm(`Βρέθηκε συνεδρία (Session) για το: ${session.user.email}`);
                    currentPharmacyId = session.user.id;
                    await checkApprovalStatus(session.user.email);
                } else {
                    logTerm("Κανένα Session. Απαιτείται Σύνδεση.");
                    clearTimeout(sTimer);
                    document.getElementById('global-loader').classList.add('hidden');
                    showAuth();
                }
            });
        });

        async function checkApprovalStatus(email) {
            try {
                logTerm(`Αναζήτηση φαρμακείου στη βάση με ID: ${currentPharmacyId}`);
                const { data: pharmacy, error } = await window.db.from('pharmacies').select('*').eq('id', currentPharmacyId).single();
                
                if (error) {
                    logTerm(`Μήνυμα από βάση: ${error.message} (Αυτό είναι φυσιολογικό αν είναι νέος χρήστης)`, true);
                }

                if (!pharmacy) {
                    logTerm("Δεν βρέθηκε εγγραφή. Προσπάθεια δημιουργίας (Insert)...");
                    const { data: inserted, error: insertErr } = await window.db.from('pharmacies').insert([{
                        id: currentPharmacyId,
                        name: 'Φαρμακείο (' + email + ')',
                        status: 'pending'
                    }]).select();
                    
                    if (insertErr) {
                        logTerm(`[ΚΡΙΣΙΜΟ ΣΦΑΛΜΑ] Αποτυχία εγγραφής στη βάση: ${insertErr.message}`, true);
                        throw insertErr;
                    } else {
                        logTerm("Η εγγραφή ολοκληρώθηκε! (Pending)");
                        showPending();
                    }
                } else {
                    logTerm(`Το φαρμακείο βρέθηκε! Κατάσταση: ${pharmacy.status}`);
                    if (pharmacy.status === 'approved') showDashboard(pharmacy);
                    else showPending();
                }
            } catch (err) {
                logTerm(`ΣΦΑΛΜΑ: ${err.message || err}`, true);
                showAuth();
            } finally {
                document.getElementById('global-loader').classList.add('hidden');
            }
        }

        async function handleProLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.innerHTML = 'Αποστολή...';
            const email = document.getElementById('pro-email').value;
            
            // ΔΥΝΑΜΙΚΟ REDIRECT URL
            const redirectUrl = window.location.origin + window.location.pathname;
            logTerm(`Ζητήθηκε Magic Link για: ${email} (Redirecting to: ${redirectUrl})`);

            const { error } = await window.db.auth.signInWithOtp({
                email: email,
                options: { emailRedirectTo: redirectUrl }
            });

            if (error) {
                logTerm(`ΣΦΑΛΜΑ Magic Link: ${error.message}`, true);
                btn.innerHTML = 'Αποστολή Ξανά';
            } else {
                logTerm("Το email εστάλη!");
                btn.innerHTML = 'Εστάλη!';
            }
        }

        async function handleGoogleLoginPro() {
            const redirectUrl = window.location.origin + window.location.pathname;
            logTerm(`Ζητήθηκε Google Auth (Redirecting to: ${redirectUrl})`);
            const { error } = await window.db.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: redirectUrl }
            });
            if (error) logTerm(`ΣΦΑΛΜΑ Google: ${error.message}`, true);
        }

        function showAuth() {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('dashboard-section').classList.add('hidden');
            document.getElementById('pending-section').classList.add('hidden');
        }
        function showPending() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.add('hidden');
            document.getElementById('pending-section').classList.remove('hidden');
        }
        function showDashboard(pharmacy) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('pending-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
            document.getElementById('pharmacy-name-display').innerText = pharmacy.name;
            document.getElementById('btn-sound').classList.remove('hidden');
            logTerm("Επιτυχής είσοδος. Φόρτωση αιτημάτων...");
            fetchRequests();
        }

        async function logout() {
            logTerm("Αποσύνδεση...");
            await window.db.auth.signOut();
            window.location.reload();
        }

        // --- Dummy dashboard functions to prevent errors ---
        async function fetchRequests() { logTerm("Αναζήτηση Requests (Mock)..."); }
        function enableSound() { logTerm("Ήχος ΟΚ"); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediRadar Pro - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = "https://qzerrisyowkfkmcyxmav.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6ZXJyaXN5b3drZmttY3l4bWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAwMTcxODQsImV4cCI6MjA3NTU5MzE4NH0.alkvHkOQPBTwY3daUcKAEsf4-aI1tQvKxmhR-S330i4";
        window.db = supabase.createClient(SB_URL, SB_KEY);
    </script>
</head>
<body class="bg-slate-100 text-slate-800">

    <div id="loader" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
            <p>Σύνδεση στο σύστημα...</p>
        </div>
    </div>

    <section id="ui-auth" class="min-h-screen flex items-center justify-center hidden p-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center">
            <h1 class="text-2xl font-bold mb-6">MediRadar Pro</h1>
            <button onclick="login()" class="w-full bg-white border-2 p-3 rounded-2xl flex items-center justify-center gap-2 font-bold hover:bg-slate-50 transition-all">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5"> Σύνδεση με Google
            </button>
        </div>
    </section>

    <section id="ui-main" class="min-h-screen hidden">
        <nav class="bg-white p-4 border-b flex justify-between items-center shadow-sm">
            <span class="font-bold text-blue-600">MediRadar Pro</span>
            <button onclick="window.db.auth.signOut().then(()=>location.reload())" class="text-red-500 font-bold text-sm">Έξοδος</button>
        </nav>
        <main class="p-6 max-w-4xl mx-auto">
            <h2 class="text-xl font-bold mb-6">Νέα Αιτήματα</h2>
            <div id="req-list" class="space-y-4"></div>
        </main>
    </section>

    <script>
        // ΕΛΕΓΧΟΣ SESSION
        window.db.auth.onAuthStateChange(async (event, session) => {
            if (session) {
                await syncPharmacy(session.user);
            } else {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('ui-auth').classList.remove('hidden');
            }
        });

        async function syncPharmacy(user) {
            // 1. Παίρνουμε το φαρμακείο
            const { data } = await window.db.from('pharmacies').select('*').eq('id', user.id);
            let pharmacy = data && data.length > 0 ? data[0] : null;

            // 2. Αν δεν υπάρχει, το γράφουμε (INSERT)
            if (!pharmacy) {
                await window.db.from('pharmacies').insert([{ 
                    id: user.id, 
                    name: user.user_metadata.full_name || 'Νέο Φαρμακείο',
                    status: 'pending' 
                }]);
                showPending();
                return;
            }

            // 3. Αν υπάρχει αλλά είναι Pending
            if (pharmacy.status !== 'approved') {
                showPending();
                return;
            }

            // 4. Αν είναι Approved, δείξε Dashboard
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('ui-main').classList.remove('hidden');
            loadRequests();
            // Realtime update
            window.db.channel('any').on('postgres_changes', {event:'*', schema:'public', table:'requests'}, loadRequests).subscribe();
        }

        function showPending() {
            document.getElementById('loader').innerHTML = `
                <div class="p-10 text-center">
                    <h1 class="text-2xl font-bold text-orange-600 mb-2">Σε αναμονή έγκρισης</h1>
                    <p class="text-slate-500">Ο Admin πρέπει να ενεργοποιήσει το λογαριασμό σας.</p>
                    <button onclick="window.db.auth.signOut().then(()=>location.reload())" class="mt-6 text-blue-600 underline">Αποσύνδεση</button>
                </div>`;
        }

        async function login() {
            await window.db.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + window.location.pathname }
            });
        }

        async function loadRequests() {
            const { data } = await window.db.from('requests').select('*').eq('status', 'pending').order('created_at', {ascending: false});
            const list = document.getElementById('req-list');
            if (!data || data.length === 0) {
                list.innerHTML = "<p class='text-slate-400 text-center py-20'>Δεν υπάρχουν νέα αιτήματα...</p>";
                return;
            }
            list.innerHTML = data.map(r => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-lg">${r.medicine_name}</h3>
                        <p class="text-sm text-slate-500">${r.customer_name || 'Πελάτης'}</p>
                    </div>
                    <button onclick="accept('${r.id}')" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">Το έχω</button>
                </div>
            `).join('');
        }

        async function accept(id) {
            const user = (await window.db.auth.getUser()).data.user;
            await window.db.from('requests').update({ 
                status: 'reserved', 
                pharmacy_id: user.id 
            }).eq('id', id);
            alert("Το αίτημα δεσμεύτηκε!");
        }
    </script>
</body>
</html>
